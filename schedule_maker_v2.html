<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>진료일정 메이커</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background:#1a1a1f; font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif; color:#e8e8e8; }
::-webkit-scrollbar{width:5px} ::-webkit-scrollbar-track{background:#1a1a1f} ::-webkit-scrollbar-thumb{background:#444;border-radius:3px}
select option{background:#2e2e38}
input[type=color]{-webkit-appearance:none;border:none;padding:0;cursor:pointer;}
input[type=color]::-webkit-color-swatch-wrapper{padding:0;}
input[type=color]::-webkit-color-swatch{border:none;border-radius:3px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect,useCallback}=React;

const SIZES={
  square:{w:1080,h:1080,label:"정방형 1:1"},
  instagram:{w:1080,h:1350,label:"인스타그램 4:5"},
  did:{w:1920,h:1080,label:"DID 16:9"},
  standard:{w:1600,h:1200,label:"표준 4:3"},
};

const DAYS=["일","월","화","수","목","금","토"];

const DEFAULT_MARK_COLORS={rest:"#e53e3e",night:"#276749",open:"#2b6cb0"};
const MARK_DEFS=[
  {value:"rest",label:"휴진"},
  {value:"night",label:"야간진료"},
  {value:"open",label:"개원"},
];

const ALIGN_PRESETS=[
  {label:"↖",x:0.15,y:0.28},{label:"↑",x:0.5,y:0.28},{label:"↗",x:0.85,y:0.28},
  {label:"←",x:0.15,y:0.54},{label:"●",x:0.5,y:0.54},{label:"→",x:0.85,y:0.54},
  {label:"↙",x:0.15,y:0.80},{label:"↓",x:0.5,y:0.80},{label:"↘",x:0.85,y:0.80},
];

const dim=(y,m)=>new Date(y,m,0).getDate();
const fday=(y,m)=>new Date(y,m-1,1).getDay();
const dk=(y,m,d)=>`${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

function rr(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

/* ── ColorPicker ── */
function ColorPicker({color,onChange}){
  const [hex,setHex]=useState(color);
  useEffect(()=>setHex(color),[color]);
  const handleHex=v=>{
    setHex(v);
    if(/^#[0-9a-fA-F]{6}$/.test(v)) onChange(v);
  };
  return(
    <div style={{display:"flex",alignItems:"center",gap:5}}>
      <input type="color" value={color}
        onChange={e=>{setHex(e.target.value);onChange(e.target.value);}}
        style={{width:28,height:26,borderRadius:5,overflow:"hidden",flexShrink:0}}/>
      <input value={hex} onChange={e=>handleHex(e.target.value)} placeholder="#000000"
        style={{flex:1,padding:"4px 7px",borderRadius:5,border:"1px solid #3a3a44",
          background:"#13131a",color:"#e8e8e8",fontSize:11,fontFamily:"monospace"}}/>
    </div>
  );
}

/* ── App ── */
function App(){
  const now=new Date();
  const [year,setYear]=useState(now.getFullYear());
  const [month,setMonth]=useState(now.getMonth()+1);
  const [marks,setMarks]=useState({});
  const [tool,setTool]=useState("rest");
  const [bgImg,setBgImg]=useState(null);
  const [logo,setLogo]=useState(null);
  const [lpos,setLpos]=useState({x:0.65,y:0.04});
  const [lsz,setLsz]=useState(130);
  const [outSz,setOutSz]=useState("square");
  const [calScale,setCalScale]=useState(1.0);
  const [calPos,setCalPos]=useState({x:0.5,y:0.54});
  const [calShape,setCalShape]=useState("wide"); // 'wide' | 'square'
  const [drag,setDrag]=useState(null);
  const [ds,setDs]=useState(null);
  const [markColors,setMarkColors]=useState(DEFAULT_MARK_COLORS);
  const [nightTime,setNightTime]=useState("");

  const exRef=useRef(null),pvRef=useRef(null),bgRef=useRef(null),lgRef=useRef(null),wRef=useRef(null);
  const sz=SIZES[outSz];

  /* ── draw ── */
  const draw=useCallback(()=>{
    const cv=exRef.current; if(!cv)return;
    const W=sz.w,H=sz.h;
    cv.width=W; cv.height=H;
    const ctx=cv.getContext("2d");

    // background
    ctx.fillStyle="#f0ece6"; ctx.fillRect(0,0,W,H);
    if(bgRef.current){
      const img=bgRef.current,sc=Math.max(W/img.width,H/img.height);
      ctx.drawImage(img,(W-img.width*sc)/2,(H-img.height*sc)/2,img.width*sc,img.height*sc);
    }

    // calendar dimensions
    const baseCw=W*0.85;
    const baseCh=calShape==="square" ? baseCw : H*0.725;
    const cw=baseCw*calScale, ch=baseCh*calScale;
    const px=calPos.x*W - cw/2;
    const calTop=calPos.y*H - ch/2;
    const titleY=calTop - ch*0.07;
    const cew=cw/7;
    const days=dim(year,month), fd=fday(year,month);
    const wks=Math.ceil((fd+days)/7);
    const hh=ch*0.085, ceh=(ch-hh)/wks;

    // title
    ctx.textAlign="left"; ctx.fillStyle="#111";
    ctx.font=`900 ${W*0.062*calScale}px 'Apple SD Gothic Neo',sans-serif`;

    ctx.font=`400 ${W*0.0175*calScale}px 'Apple SD Gothic Neo',sans-serif`;
    ctx.fillStyle="#444";

    // calendar bg
    ctx.fillStyle="rgba(255,255,255,0.93)";
    rr(ctx,px,calTop,cw,ch,W*0.012); ctx.fill();

    // day headers
    DAYS.forEach((d,i)=>{
      ctx.font=`700 ${W*0.0175*calScale}px 'Apple SD Gothic Neo',sans-serif`;
      ctx.textAlign="center";
      ctx.fillStyle=i===0?"#e53e3e":i===6?"#2b6cb0":"#333";
      ctx.fillText(d,px+cew*i+cew/2,calTop+hh*0.68);
    });

    // grid lines
    ctx.strokeStyle="#e0e0e0"; ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(px,calTop+hh);ctx.lineTo(px+cw,calTop+hh);ctx.stroke();
    for(let i=1;i<7;i++){ctx.beginPath();ctx.moveTo(px+cew*i,calTop+hh);ctx.lineTo(px+cew*i,calTop+ch);ctx.stroke();}
    for(let r=1;r<=wks;r++){ctx.beginPath();ctx.moveTo(px,calTop+hh+ceh*r);ctx.lineTo(px+cw,calTop+hh+ceh*r);ctx.stroke();}

    // date cells
    for(let d=1;d<=days;d++){
      const dw=(fd+d-1)%7, row=Math.floor((fd+d-1)/7);
      const cx=px+cew*dw, cy=calTop+hh+ceh*row;
      const markVal=marks[dk(year,month,d)];
      const markDef=MARK_DEFS.find(o=>o.value===markVal);

      // date number
      ctx.font=`700 ${W*0.022*calScale}px 'Apple SD Gothic Neo',sans-serif`;
      ctx.textAlign="left";
      ctx.fillStyle=dw===0?"#e53e3e":dw===6?"#2b6cb0":"#222";
      ctx.fillText(String(d),cx+cew*0.1,cy+ceh*0.28);

      if(markDef){
        const bg=markColors[markDef.value];
        const fs=W*0.016*calScale;
        const bcx=cx+cew/2;
        ctx.textAlign="center";

        if(markDef.value==="night" && nightTime.trim()){
          // two-line badge: time + label
          const timeFontSize=fs*0.82;
          ctx.font=`700 ${fs}px 'Apple SD Gothic Neo',sans-serif`;
          const labelW=ctx.measureText(markDef.label).width;
          ctx.font=`700 ${timeFontSize}px 'Apple SD Gothic Neo',sans-serif`;
          const timeW=ctx.measureText(nightTime.trim()).width;
          const bw=Math.max(labelW,timeW)+fs*1.4;
          const bh=fs*2.9;
          const bcy=cy+ceh*0.63;
          ctx.fillStyle=bg; rr(ctx,bcx-bw/2,bcy-bh/2,bw,bh,bh/4); ctx.fill();
          ctx.fillStyle="#fff";
          ctx.font=`700 ${timeFontSize}px 'Apple SD Gothic Neo',sans-serif`;
          ctx.fillText(nightTime.trim(),bcx,bcy-fs*0.38);
          ctx.font=`700 ${fs}px 'Apple SD Gothic Neo',sans-serif`;
          ctx.fillText(markDef.label,bcx,bcy+fs*0.78);
        } else {
          ctx.font=`700 ${fs}px 'Apple SD Gothic Neo',sans-serif`;
          const bw=ctx.measureText(markDef.label).width+fs*1.2, bh=fs*1.55, bcy=cy+ceh*0.65;
          ctx.fillStyle=bg; rr(ctx,bcx-bw/2,bcy-bh/2,bw,bh,bh/2); ctx.fill();
          ctx.fillStyle="#fff"; ctx.fillText(markDef.label,bcx,bcy+fs*0.37);
        }
      }
    }

    ctx.textAlign="left";

    // logo
    if(lgRef.current){
      const li=lgRef.current,lh=lsz*(W/1080),lw=lh*(li.width/li.height);
      ctx.drawImage(li,lpos.x*W,lpos.y*H,lw,lh);
    }

    // preview
    const pv=pvRef.current; if(!pv||!wRef.current)return;
    const mw=wRef.current.clientWidth||700, sc=mw/W;
    pv.width=mw; pv.height=Math.round(H*sc);
    const pc=pv.getContext("2d"); pc.scale(sc,sc); pc.drawImage(cv,0,0);
  },[year,month,marks,lpos,lsz,outSz,sz,calScale,calPos,calShape,markColors,nightTime]);

  useEffect(()=>{
    if(!bgImg){bgRef.current=null;draw();return;}
    const img=new Image();img.onload=()=>{bgRef.current=img;draw();};img.src=bgImg;
  },[bgImg]);
  useEffect(()=>{
    if(!logo){lgRef.current=null;draw();return;}
    const img=new Image();img.onload=()=>{lgRef.current=img;draw();};img.src=logo;
  },[logo]);
  useEffect(()=>{draw();},[draw]);

  const toggle=d=>{
    const k=dk(year,month,d);
    setMarks(p=>{if(p[k]===tool){const n={...p};delete n[k];return n;}return{...p,[k]:tool};});
  };

  const gcp=e=>{
    const r=pvRef.current.getBoundingClientRect(),sc=sz.w/pvRef.current.width;
    return{cx:((e.clientX??e.touches?.[0]?.clientX)-r.left)*sc,
           cy:((e.clientY??e.touches?.[0]?.clientY)-r.top)*sc};
  };

  const calHitBox=()=>{
    const W=sz.w,H=sz.h;
    const baseCw=W*0.85, baseCh=calShape==="square"?W*0.85:H*0.725;
    const cw=baseCw*calScale, ch=baseCh*calScale;
    return{cpx:calPos.x*W-cw/2,cpy:calPos.y*H-ch/2,cw,ch};
  };

  const onLogoHit=({cx,cy})=>{
    if(!lgRef.current)return false;
    const li=lgRef.current,lh=lsz*(sz.w/1080),lw=lh*(li.width/li.height);
    return cx>=lpos.x*sz.w&&cx<=lpos.x*sz.w+lw&&cy>=lpos.y*sz.h&&cy<=lpos.y*sz.h+lh;
  };
  const onCalHit=({cx,cy})=>{
    const{cpx,cpy,cw,ch}=calHitBox();
    return cx>=cpx&&cx<=cpx+cw&&cy>=cpy&&cy<=cpy+ch;
  };

  const omd=e=>{
    const p=gcp(e);
    if(onLogoHit(p)){setDrag("logo");setDs({p,lx:lpos.x*sz.w,ly:lpos.y*sz.h});e.preventDefault();}
    else if(onCalHit(p)){setDrag("cal");setDs({p,cx:calPos.x*sz.w,cy:calPos.y*sz.h});e.preventDefault();}
  };
  const omm=e=>{
    if(!drag||!ds)return;
    const p=gcp(e);
    if(drag==="logo") setLpos({x:Math.max(0,Math.min(.97,(ds.lx+p.cx-ds.p.cx)/sz.w)),y:Math.max(0,Math.min(.97,(ds.ly+p.cy-ds.p.cy)/sz.h))});
    if(drag==="cal")  setCalPos({x:Math.max(0.1,Math.min(.9,(ds.cx+p.cx-ds.p.cx)/sz.w)),y:Math.max(0.1,Math.min(.9,(ds.cy+p.cy-ds.p.cy)/sz.h))});
  };
  const omu=()=>{setDrag(null);setDs(null);};

  const dl=()=>{
    draw();
    exRef.current.toBlob(b=>{
      const a=document.createElement("a");
      a.href=URL.createObjectURL(b);
      a.download=`진료일정_${year}년${month}월.png`;
      a.click();
    },"image/png");
  };

  const fd2=fday(year,month),total=dim(year,month);
  const cells=[...Array(fd2).fill(null),...Array.from({length:total},(_,i)=>i+1)];

  // UI helpers
  const ss={flex:1,padding:"7px 8px",borderRadius:7,border:"1px solid #3a3a44",background:"#262630",color:"#e8e8e8",fontSize:12,cursor:"pointer"};
  const sec=(t,c)=>(
    <div style={{padding:"13px 15px",borderBottom:"1px solid #252530"}}>
      <div style={{fontSize:10,fontWeight:700,color:"#7c6ff7",marginBottom:8,letterSpacing:"1px",textTransform:"uppercase"}}>{t}</div>
      {c}
    </div>
  );
  const fu=(lbl,ac,oc)=>(
    <label style={{display:"block",padding:"8px",border:"1.5px dashed #3a3a44",borderRadius:7,textAlign:"center",cursor:"pointer",color:"#777",fontSize:11}}
      onMouseOver={e=>e.currentTarget.style.borderColor="#7c6ff7"}
      onMouseOut={e=>e.currentTarget.style.borderColor="#3a3a44"}>
      {lbl}<input type="file" accept={ac} style={{display:"none"}} onChange={oc}/>
    </label>
  );
  const rb=(lbl,oc)=>(
    <button onClick={oc} style={{marginTop:5,width:"100%",padding:"5px",border:"1px solid #333",borderRadius:6,background:"transparent",fontSize:10,color:"#555",cursor:"pointer"}}>{lbl}</button>
  );

  return(
    <div style={{display:"flex",height:"100vh",overflow:"hidden"}}>
      {/* ── sidebar ── */}
      <div style={{width:285,flexShrink:0,background:"#1c1c24",borderRight:"1px solid #252530",display:"flex",flexDirection:"column",overflowY:"auto"}}>
        <div style={{padding:"15px",borderBottom:"1px solid #252530"}}>
          <div style={{fontSize:15,fontWeight:800,color:"#fff",letterSpacing:"-0.5px"}}>📅 진료일정 메이커</div>
          <div style={{fontSize:10,color:"#444",marginTop:2}}>설정 후 하단 버튼으로 다운로드</div>
        </div>

        {/* 진료월 */}
        {sec("진료월 선택",
          <div style={{display:"flex",gap:6}}>
            <select value={year} onChange={e=>setYear(+e.target.value)} style={ss}>
              {[2024,2025,2026,2027].map(y=><option key={y} value={y}>{y}년</option>)}
            </select>
            <select value={month} onChange={e=>setMonth(+e.target.value)} style={ss}>
              {Array.from({length:12},(_,i)=>i+1).map(m=><option key={m} value={m}>{m}월</option>)}
            </select>
          </div>
        )}

        {/* 날짜 표시 유형 + 색상 + 야간시간 */}
        {sec("날짜 표시 유형",
          <>
            <div style={{display:"flex",gap:4}}>
              {MARK_DEFS.map(o=>(
                <button key={o.value} onClick={()=>setTool(o.value)}
                  style={{flex:1,padding:"6px 2px",borderRadius:6,border:"none",cursor:"pointer",fontSize:10,fontWeight:700,color:"#fff",
                    background:tool===o.value?markColors[o.value]:"#2a2a34",
                    boxShadow:tool===o.value?`0 0 0 2px ${markColors[o.value]}55`:"none",transition:"all .15s"}}>
                  {o.label}
                </button>
              ))}
            </div>

            {/* color pickers */}
            <div style={{marginTop:10,display:"flex",flexDirection:"column",gap:7}}>
              {MARK_DEFS.map(o=>(
                <div key={o.value}>
                  <div style={{fontSize:9,color:"#555",marginBottom:3}}>{o.label} 색상</div>
                  <ColorPicker color={markColors[o.value]} onChange={v=>setMarkColors(p=>({...p,[o.value]:v}))}/>
                </div>
              ))}
            </div>

            {/* night time */}
            <div style={{marginTop:10}}>
              <div style={{fontSize:9,color:"#555",marginBottom:3}}>야간진료 시간 표시</div>
              <input value={nightTime} onChange={e=>setNightTime(e.target.value)} placeholder="예: 18:00~21:00"
                style={{width:"100%",padding:"5px 8px",borderRadius:6,border:"1px solid #3a3a44",
                  background:"#13131a",color:"#e8e8e8",fontSize:11}}/>
              <p style={{marginTop:3,fontSize:9,color:"#3a3a44"}}>입력 시 달력에 시간 + 야간진료 2줄 표시</p>
            </div>

            <p style={{marginTop:6,fontSize:9,color:"#444"}}>유형 선택 → 아래 날짜 클릭 / 재클릭 해제</p>
          </>
        )}

        {/* 달력 미니 */}
        {sec(`${year}년 ${month}월`,
          <>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,textAlign:"center"}}>
              {DAYS.map((d,i)=>(
                <div key={d} style={{fontSize:8,fontWeight:700,paddingBottom:2,color:i===0?"#e53e3e":i===6?"#5b9bd5":"#555"}}>{d}</div>
              ))}
              {cells.map((d,idx)=>{
                if(!d)return<div key={`e${idx}`}/>;
                const dw=(fd2+d-1)%7;
                const markVal=marks[dk(year,month,d)];
                const markDef=MARK_DEFS.find(o=>o.value===markVal);
                const bg=markDef?markColors[markDef.value]:null;
                return(
                  <div key={d} onClick={()=>toggle(d)}
                    style={{padding:"3px 0",borderRadius:4,cursor:"pointer",
                      background:bg?bg+"44":"transparent",
                      border:bg?`1.5px solid ${bg}66`:"1.5px solid transparent",transition:"all .1s"}}>
                    <div style={{fontSize:10,fontWeight:600,color:dw===0?"#e53e3e":dw===6?"#5b9bd5":"#bbb"}}>{d}</div>
                    {bg&&<div style={{fontSize:6,color:bg}}>●</div>}
                  </div>
                );
              })}
            </div>
            <button onClick={()=>setMarks({})}
              style={{marginTop:7,width:"100%",padding:"4px",border:"1px solid #2e2e38",borderRadius:5,background:"transparent",fontSize:10,color:"#444",cursor:"pointer"}}>
              전체 초기화
            </button>
          </>
        )}

        {/* 배경 이미지 */}
        {sec("배경 이미지",
          <>
            {fu(bgImg?"✅ 선택됨 — 클릭하여 교체":"+ 배경 이미지 선택","image/*",e=>{
              const f=e.target.files[0];if(!f)return;
              const r=new FileReader();r.onload=ev=>setBgImg(ev.target.result);r.readAsDataURL(f);
            })}
            {bgImg&&rb("배경 제거",()=>setBgImg(null))}
          </>
        )}

        {/* 로고 */}
        {sec("로고",
          <>
            {fu(logo?"✅ 로고 선택됨 — 교체":"+ 로고 이미지 선택","image/*",e=>{
              const f=e.target.files[0];if(!f)return;
              const r=new FileReader();r.onload=ev=>setLogo(ev.target.result);r.readAsDataURL(f);
            })}
            {logo&&(
              <>
                <div style={{display:"flex",alignItems:"center",gap:5,marginTop:8}}>
                  <span style={{fontSize:9,color:"#555",whiteSpace:"nowrap"}}>크기</span>
                  <input type="range" min={60} max={320} value={lsz} onChange={e=>setLsz(+e.target.value)} style={{flex:1,accentColor:"#7c6ff7"}}/>
                  <span style={{fontSize:9,color:"#555",width:20}}>{lsz}</span>
                </div>
                <p style={{marginTop:4,fontSize:9,color:"#3a3a44"}}>미리보기에서 로고 드래그 가능</p>
                {rb("로고 제거",()=>setLogo(null))}
              </>
            )}
          </>
        )}

        {/* 달력 설정 */}
        {sec("달력 설정",
          <div style={{display:"flex",flexDirection:"column",gap:10}}>

            {/* shape */}
            <div>
              <div style={{fontSize:9,color:"#555",marginBottom:5}}>달력 비율</div>
              <div style={{display:"flex",gap:4}}>
                {[{v:"wide",l:"가로형"},{v:"square",l:"정방형 1:1"}].map(({v,l})=>(
                  <button key={v} onClick={()=>setCalShape(v)}
                    style={{flex:1,padding:"7px 4px",borderRadius:6,border:"none",cursor:"pointer",fontSize:10,fontWeight:600,
                      background:calShape===v?"#7c6ff7":"#232330",color:calShape===v?"#fff":"#666",transition:"all .15s"}}>
                    {l}
                  </button>
                ))}
              </div>
            </div>

            {/* scale */}
            <div>
              <div style={{fontSize:9,color:"#555",marginBottom:4}}>
                달력 크기 <span style={{color:"#7c6ff7",fontWeight:700}}>{Math.round(calScale*100)}%</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:9,color:"#444"}}>작게</span>
                <input type="range" min={0.5} max={1.3} step={0.01} value={calScale}
                  onChange={e=>setCalScale(+e.target.value)} style={{flex:1,accentColor:"#7c6ff7"}}/>
                <span style={{fontSize:9,color:"#444"}}>크게</span>
              </div>
            </div>

            {/* alignment grid */}
            <div>
              <div style={{fontSize:9,color:"#555",marginBottom:5}}>달력 정렬</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:4}}>
                {ALIGN_PRESETS.map(({label,x,y})=>{
                  const active=Math.abs(calPos.x-x)<0.01&&Math.abs(calPos.y-y)<0.01;
                  return(
                    <button key={label} onClick={()=>setCalPos({x,y})}
                      style={{padding:"7px",borderRadius:6,border:`1px solid ${active?"#7c6ff7":"#2e2e38"}`,
                        background:active?"#7c6ff7":"#1e1e28",color:active?"#fff":"#888",
                        cursor:"pointer",fontSize:13,transition:"all .12s"}}>
                      {label}
                    </button>
                  );
                })}
              </div>
              <p style={{marginTop:4,fontSize:9,color:"#3a3a44"}}>미리보기에서 달력 드래그도 가능</p>
            </div>
          </div>
        )}

        {/* 출력 사이즈 */}
        {sec("출력 사이즈",
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {Object.entries(SIZES).map(([k,v])=>(
              <button key={k} onClick={()=>setOutSz(k)}
                style={{padding:"7px 10px",borderRadius:6,border:"none",cursor:"pointer",textAlign:"left",
                  fontSize:11,fontWeight:600,background:outSz===k?"#7c6ff7":"#232330",
                  color:outSz===k?"#fff":"#777",transition:"all .15s"}}>
                {v.label}
                <span style={{float:"right",fontWeight:400,fontSize:9,opacity:.6}}>{v.w}×{v.h}</span>
              </button>
            ))}
          </div>
        )}

        {/* 다운로드 */}
        <div style={{padding:"14px 15px 22px",marginTop:"auto"}}>
          <button onClick={dl}
            style={{width:"100%",padding:"13px",borderRadius:10,border:"none",
              background:"linear-gradient(135deg,#7c6ff7,#4a9ed6)",color:"#fff",
              fontSize:13,fontWeight:800,cursor:"pointer",
              boxShadow:"0 4px 18px rgba(124,111,247,.35)",letterSpacing:"-0.3px"}}>
            ⬇️ 출력 (이미지 다운로드)
          </button>
        </div>
      </div>

      {/* ── preview ── */}
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",padding:"20px 24px",gap:10,overflow:"auto",background:"#1a1a1f"}}>
        <div style={{alignSelf:"flex-start",fontSize:10,color:"#3a3a44",display:"flex",gap:8}}>
          <span>👁 실시간 미리보기</span>
          <span style={{color:"#7c6ff7"}}>· 달력 또는 로고를 드래그하여 위치 조정</span>
        </div>
        <div ref={wRef} style={{width:"100%",maxWidth:860,borderRadius:12,overflow:"hidden",boxShadow:"0 8px 60px rgba(0,0,0,.7)",cursor:drag?"grabbing":"grab"}}>
          <canvas ref={pvRef} style={{display:"block",width:"100%"}}
            onMouseDown={omd} onMouseMove={omm} onMouseUp={omu} onMouseLeave={omu}/>
        </div>
        <canvas ref={exRef} style={{display:"none"}}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
